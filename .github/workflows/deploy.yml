name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Create site if needed & Deploy
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          # Try to deploy to existing site, create if not exists
          netlify deploy \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --dir "." \
            --site "nexora-studio" \
            --prod \
            --message "NEXORA Studio deploy" 2>&1 || \
          netlify sites:create \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --name "nexora-studio" && \
          netlify deploy \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --dir "." \
            --site "nexora-studio" \
            --prod \
            --message "NEXORA Studio deploy"
